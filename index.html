<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sayang 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    overflow: hidden;
}

h1 {
    margin-top: 60px;
    font-size: 45px;
    animation: fadeIn 2s ease-in-out;
}

p {
    font-size: 20px;
    margin: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4b7d;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4b7d;
    color: white;
}

.heart {
    position: absolute;
    color: pink;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh); opacity: 1;}
    100% {transform: translateY(-10vh); opacity: 0;}
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<h1>💖 Happy Birthday Sayang 💖</h1>
<p>Untuk kamu yang selalu ada di hatiku ❤️</p>

<button onclick="surprise()">Klik ini ya 🎁</button>

<p id="pesan"></p>

<script>
function surprise() {
    document.getElementById("pesan").innerHTML =
    "Aku bersyukur banget punya kamu 💕 Semoga kamu selalu bahagia, sehat, dan tetap jadi orang yang aku sayang.ily sayang aku💖";

    // efek love jatuh
    for (let i = 0; i < 20; i++) {
        let love = document.createElement("div");
        love.innerHTML = "💖";
        love.className = "heart";
        love.style.left = Math.random() * 100 + "vw";
        love.style.fontSize = (20 + Math.random() * 30) + "px";
        love.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(love);
    }
}
</script>

</body>
</html>
